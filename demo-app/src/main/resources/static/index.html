<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 陪伴伙伴</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
               min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 500px; height: 100vh; max-height: 800px;
               background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
               display: flex; flex-direction: column; overflow: hidden; margin: 20px; }
        #header { background: linear-gradient(135deg, #667eea, #764ba2); color: white;
                  padding: 20px; text-align: center; font-size: 1.2em; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex;
                    flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px;
               line-height: 1.5; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: #667eea; color: white;
                    border-bottom-right-radius: 4px; }
        .msg.assistant { align-self: flex-start; background: #f0f0f0; color: #333;
                         border-bottom-left-radius: 4px; }
        #input-area { display: flex; padding: 16px; border-top: 1px solid #eee; gap: 8px; }
        #input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 24px;
                 font-size: 1em; outline: none; }
        #input:focus { border-color: #667eea; }
        #send { padding: 12px 24px; background: #667eea; color: white; border: none;
                border-radius: 24px; cursor: pointer; font-size: 1em; }
        #send:hover { background: #5a6fd6; }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">AI 陪伴伙伴 — 小伴</div>
        <div id="messages">
            <div class="msg assistant">你好！我是小伴，你的AI聊天伙伴~ 想聊点什么？</div>
        </div>
        <div id="input-area">
            <input id="input" type="text" placeholder="输入消息..." autofocus />
            <button id="send" onclick="send()">发送</button>
        </div>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            addMsg('user', msg);
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                addMsg('assistant', data.response);
            } catch(e) {
                addMsg('assistant', '抱歉，出错了: ' + e.message);
            }
        }
        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
        document.getElementById('input').addEventListener('keypress', e => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
